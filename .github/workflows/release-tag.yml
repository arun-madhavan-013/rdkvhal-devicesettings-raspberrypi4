name: Release Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release version in X.Y.Z format
        required: true
        type: string
      ticket:
        description: Ticket ID (for example RDK7RM-35)
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  publish:
    name: Create Release PRs
    runs-on: ubuntu-latest
    env:
      RELNUM: ${{ inputs.tag }}
      TICKET: ${{ inputs.ticket }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node and Tools
        run: |
          sudo apt-get update && sudo apt-get install -y git-flow
          npm install -g auto-changelog

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

  validate-inputs:
    name: Validate Manual Trigger
    runs-on: ubuntu-latest
    steps:
      - name: Show Inputs
        run: |
          echo "Release Tag workflow was triggered manually"
          echo "tag=${{ inputs.tag }}"
          echo "ticket=${{ inputs.ticket }}"

      - name: Basic Validation
        run: |
          if ! [[ "${{ inputs.tag }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format. Expected X.Y.Z"
            exit 1
          fi

          if ! [[ "${{ inputs.ticket }}" =~ ^[A-Z]+[A-Z0-9]*-[0-9]+$ ]]; then
            echo "Invalid ticket format. Expected PROJECT-123"
            exit 1
          fi

          echo "Inputs are valid"
      - name: Check for Existing Tag
        run: |
          if git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.tag }} already exists. Please choose a different tag."
            exit 1
          fi
          echo "Tag ${{ inputs.tag }} does not exist, proceeding with release process."
