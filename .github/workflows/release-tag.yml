name: Release Tag
# Manual trigger: go to Actions > Release Tag > Run workflow
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release version in strict semantic format X.Y.Z (for example: 4.1.0)"
        required: true
        type: string
      ticket:
        description: "Required ticket prefix; ':' is auto-appended if missing (example: RDK7RM-35, RDKVREFPLT-5489:)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: release-tag-global
  cancel-in-progress: false

jobs:
  publish:
    name: Create Release PRs
    runs-on: ubuntu-latest
    env:
      RELNUM: ${{ inputs.tag }}
      TICKET: ${{ inputs.ticket }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node and Tools
        run: |
          sudo apt-get update && sudo apt-get install -y git-flow
          npm install -g auto-changelog

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Validate Release Number
        run: |
          if ! [[ $RELNUM =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release number: $RELNUM (expected X.Y.Z format)"
            exit 1
          fi
          echo "Release number valid: $RELNUM"

      - name: Validate Ticket Prefix
        run: |
          TICKET_PREFIX="${TICKET%:}"
          if ! [[ $TICKET_PREFIX =~ ^[A-Z]+[A-Z0-9]*-[0-9]+$ ]]; then
            echo "Invalid ticket format: $TICKET_PREFIX"
            echo "Expected format: PROJECT-123 or PROJ-999"
            exit 1
          fi
          TICKET_WITH_COLON="${TICKET_PREFIX}:"
          echo "Ticket validated: $TICKET_WITH_COLON"

      - name: Check Tag Doesn't Exist
        id: tag-check
        run: |
          if git show-ref --verify --quiet "refs/tags/$RELNUM" || \
             git ls-remote --exit-code --heads origin "release/$RELNUM" >/dev/null 2>&1; then
            echo "Release branch/tag already exists for version $RELNUM"
            exit 1
          fi
          echo "No existing release branch for version $RELNUM"

      - name: Configure git-flow
        run: |
          git flow config set versiontagprefix "v"

      - name: Create Release Branch
        run: |
          git flow release start "$RELNUM"
          echo "Created release branch: release/$RELNUM"

      - name: Generate CHANGELOG
        run: |
          auto-changelog --package --release-count 0 --stdout > /tmp/new_changelog.md
          head -20 /tmp/new_changelog.md
          cat /tmp/new_changelog.md > CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG for release $RELNUM"
          echo "CHANGELOG updated and committed"

      - name: Create PR to develop
        id: pr-develop
        run: |
          PR_NUM=$(gh pr create \
            --repo "${{ github.repository }}" \
            --head "release/$RELNUM" \
            --base "develop" \
            --title "Release $RELNUM → develop" \
            --body "Merge release/$RELNUM back to develop after approval.

**Ticket:** ${TICKET%:}

This PR was auto-created by the Release Tag workflow." \
            --json "number" \
            --jq ".number" 2>/dev/null || echo "")

          if [ -z "$PR_NUM" ] || [ "$PR_NUM" == "null" ]; then
            # PR might already exist, try to fetch it
            PR_NUM=$(gh pr list \
              --repo "${{ github.repository }}" \
              --head "release/$RELNUM" \
              --base "develop" \
              --state "open" \
              --json "number" \
              --jq ".[0].number" 2>/dev/null || echo "")

            if [ -z "$PR_NUM" ] || [ "$PR_NUM" == "null" ]; then
              echo "Could not create or find PR to develop"
              exit 1
            fi
            echo "PR to develop already exists: #$PR_NUM"
          else
            echo "Created PR to develop: #$PR_NUM"
          fi
          echo "pr_develop=$PR_NUM" >> $GITHUB_OUTPUT

      - name: Create PR to main
        id: pr-main
        run: |
          PR_NUM=$(gh pr create \
            --repo "${{ github.repository }}" \
            --head "release/$RELNUM" \
            --base "main" \
            --title "Release $RELNUM → main" \
            --body "Merge release/$RELNUM to main for production release.

**Ticket:** ${TICKET%:}
**Release Tag:** $RELNUM

This PR was auto-created by the Release Tag workflow.

**Next Steps:**
1. Review the changes in this PR
2. Approve this PR and the PR to develop
3. Status checks must pass on both PRs
4. Once approved and checks pass, the release will automatically finish and merge" \
            --json "number" \
            --jq ".number" 2>/dev/null || echo "")

          if [ -z "$PR_NUM" ] || [ "$PR_NUM" == "null" ]; then
            # PR might already exist, try to fetch it
            PR_NUM=$(gh pr list \
              --repo "${{ github.repository }}" \
              --head "release/$RELNUM" \
              --base "main" \
              --state "open" \
              --json "number" \
              --jq ".[0].number" 2>/dev/null || echo "")

            if [ -z "$PR_NUM" ] || [ "$PR_NUM" == "null" ]; then
              echo "Could not create or find PR to main"
              exit 1
            fi
            echo "PR to main already exists: #$PR_NUM"
          else
            echo "Created PR to main: #$PR_NUM"
          fi
          echo "pr_main=$PR_NUM" >> $GITHUB_OUTPUT

      - name: Job Summary
        run: |
          {
            echo "#### Release $RELNUM - Step1 Completed"
            echo ""
            echo "**Inputs**"
            echo "- Release tag: $RELNUM"
            echo "- Ticket: ${TICKET%:}"
            echo ""
            echo "**Open PR(s) to develop**"
            echo "- [PR #${{ steps.pr-develop.outputs.pr_develop }}](https://github.com/${{ github.repository }}/pull/${{ steps.pr-develop.outputs.pr_develop }})"
            echo ""
            echo "**Open PR(s) to main**"
            echo "- [PR #${{ steps.pr-main.outputs.pr_main }}](https://github.com/${{ github.repository }}/pull/${{ steps.pr-main.outputs.pr_main }})"
            echo ""
            echo "**Required Next Action**"
            echo "1. Review both PRs above"
            echo "2. Approve both PRs in GitHub"
            echo "3. Ensure status checks pass on both PRs"
            echo "4. Once all checks pass, the release will automatically finish and merge"
          } >> $GITHUB_STEP_SUMMARY
