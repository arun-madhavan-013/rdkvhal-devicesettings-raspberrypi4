name: Release Finish Auto

on:
  # Triggers on PR review submitted (approval detection)
  pull_request_review:
    types:
      - submitted
  # Also triggers on PR open/update events for initial validation
  pull_request:
    types:
      - opened
      - synchronize
      - review_requested

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: release-${{ github.event.pull_request.head.ref || github.event.review.pull_request_url }}
  cancel-in-progress: false

jobs:
  finish:
    name: Auto-Finish Release if Ready
    if: |
      github.event.pull_request.state != 'closed' &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    env:
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Extract Release Number
        id: extract
        run: |
          # Extract X.Y.Z from release/X.Y.Z
          RELNUM="${HEAD_REF#release/}"
          if ! [[ $RELNUM =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid release branch name: $HEAD_REF (expected release/X.Y.Z)"
            exit 1
          fi
          echo "release_number=$RELNUM" >> $GITHUB_OUTPUT
          echo "✅ Release number: $RELNUM"

      - name: Find Related PR to develop
        id: pr-develop
        run: |
          # Query for PR with same head branch, base=develop
          PR_NUM=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ env.HEAD_REF }}" \
            --base "develop" \
            --state "open" \
            --json "number" \
            --jq ".[0].number" 2>/dev/null || echo "")

          if [ -z "$PR_NUM" ] || [ "$PR_NUM" == "null" ]; then
            echo "❌ No open PR found from ${{ env.HEAD_REF }} to develop"
            exit 1
          fi
          echo "pr_develop=$PR_NUM" >> $GITHUB_OUTPUT
          echo "✅ PR to develop: #$PR_NUM"

      - name: Verify PR Count & Content
        run: |
          # Ensure exactly 1 PR to each base FROM THIS RELEASE BRANCH
          DEVELOP_COUNT=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ env.HEAD_REF }}" \
            --base "develop" \
            --state "open" \
            --json "number" \
            --jq "length")

          MAIN_COUNT=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ env.HEAD_REF }}" \
            --base "main" \
            --state "open" \
            --json "number" \
            --jq "length")

          if [ "$DEVELOP_COUNT" -ne 1 ]; then
            echo "❌ Expected 1 open PR to develop for ${{ env.HEAD_REF }}, found $DEVELOP_COUNT"
            exit 1
          fi

          if [ "$MAIN_COUNT" -ne 1 ]; then
            echo "❌ Expected 1 open PR to main for ${{ env.HEAD_REF }}, found $MAIN_COUNT"
            exit 1
          fi

          echo "✅ PR count verified: 1 to develop, 1 to main (for ${{ env.HEAD_REF }} only)"

      - name: Detect Other Release Branches
        run: |
          # List all other open release branches to confirm we're only finishing the correct one
          echo "📋 Checking for other release/* branches in parallel..."
          OTHER_RELEASES=$(git ls-remote origin "refs/heads/release/*" | awk '{print $2}' | sed 's|refs/heads/||' | grep -v "^release/${{ steps.extract.outputs.release_number }}$" || true)

          if [ -n "$OTHER_RELEASES" ]; then
            echo "ℹ️  Other release branches detected (won't be affected by this finish):"
            echo "$OTHER_RELEASES" | sed 's/^/   - /'
          else
            echo "✅ No other release branches - this is the only active release"
          fi

          echo ""
          echo "🎯 **FINISHING RELEASE:** ${{ steps.extract.outputs.release_number }}"
          echo "🔗 **RELEASE BRANCH:** ${{ env.HEAD_REF }}"

      - name: Check Approvals (Both PRs)
        run: |
          # Check approval on main PR (current context)
          MAIN_APPROVED=$(gh pr view \
            --repo "${{ github.repository }}" \
            "${{ github.event.pull_request.number }}" \
            --json "reviewDecision" \
            --jq ".reviewDecision")
          echo "Main PR review decision: $MAIN_APPROVED"
          if [ "$MAIN_APPROVED" != "APPROVED" ]; then
            echo "❌ Main PR (#${{ github.event.pull_request.number }}) not approved. Status: $MAIN_APPROVED"
            exit 1
          fi

          # Check approval on develop PR
          DEVELOP_PR=${{ steps.pr-develop.outputs.pr_develop }}
          DEVELOP_APPROVED=$(gh pr view \
            --repo "${{ github.repository }}" \
            "$DEVELOP_PR" \
            --json "reviewDecision" \
            --jq ".reviewDecision")
          echo "Develop PR review decision: $DEVELOP_APPROVED"
          if [ "$DEVELOP_APPROVED" != "APPROVED" ]; then
            echo "❌ Develop PR (#$DEVELOP_PR) not approved. Status: $DEVELOP_APPROVED"
            exit 1
          fi

          echo "✅ Both PRs approved"

      - name: Check Status Checks (Both PRs)
        id: check-status
        run: |
          # Main PR checks - Step 1: Get all checks
          echo "📋 Fetching all checks for Main PR #${{ github.event.pull_request.number }}..."
          MAIN_ALL_CHECKS=$(gh pr checks \
            --repo "${{ github.repository }}" \
            "${{ github.event.pull_request.number }}" \
            --json "conclusion")

          echo "🔍 Raw output (all checks):"
          echo "$MAIN_ALL_CHECKS" | jq '.'

          # Step 2: Count total checks
          MAIN_TOTAL=$(echo "$MAIN_ALL_CHECKS" | jq "length")
          echo "✅ Total checks on Main PR: $MAIN_TOTAL"

          # Step 3: Filter for passing checks
          echo "🔍 Filtering for passing statuses (SUCCESS, NEUTRAL, SKIPPED, CANCELLED)..."
          MAIN_CHECKS=$(echo "$MAIN_ALL_CHECKS" | \
            jq "[.[] | select(.conclusion | IN(\"SUCCESS\", \"NEUTRAL\", \"SKIPPED\", \"CANCELLED\"))] | length")
          echo "✅ Passing checks on Main PR: $MAIN_CHECKS"

          if [ "$MAIN_TOTAL" -eq 0 ]; then
            echo "⚠️  Main PR has 0 status checks (expected for forks)"
          elif [ "$MAIN_CHECKS" -ne "$MAIN_TOTAL" ]; then
            echo "❌ Main PR: not all checks passed"
            echo "🔍 Failed/Missing checks details:"
            echo "$MAIN_ALL_CHECKS" | jq '.[] | select(.conclusion | IN("FAILURE", "TIMED_OUT", "ACTION_REQUIRED"))'
            gh pr checks --repo "${{ github.repository }}" "${{ github.event.pull_request.number }}"
            exit 1
          else
            echo "✅ Main PR: all checks passed"
          fi

          # Develop PR checks - Step 1: Get all checks
          DEVELOP_PR=${{ steps.pr-develop.outputs.pr_develop }}
          echo ""
          echo "📋 Fetching all checks for Develop PR #$DEVELOP_PR..."
          DEVELOP_ALL_CHECKS=$(gh pr checks \
            --repo "${{ github.repository }}" \
            "$DEVELOP_PR" \
            --json "conclusion")

          echo "🔍 Raw output (all checks):"
          echo "$DEVELOP_ALL_CHECKS" | jq '.'

          # Step 2: Count total checks
          DEVELOP_TOTAL=$(echo "$DEVELOP_ALL_CHECKS" | jq "length")
          echo "✅ Total checks on Develop PR: $DEVELOP_TOTAL"

          # Step 3: Filter for passing checks
          echo "🔍 Filtering for passing statuses (SUCCESS, NEUTRAL, SKIPPED, CANCELLED)..."
          DEVELOP_CHECKS=$(echo "$DEVELOP_ALL_CHECKS" | \
            jq "[.[] | select(.conclusion | IN(\"SUCCESS\", \"NEUTRAL\", \"SKIPPED\", \"CANCELLED\"))] | length")
          echo "✅ Passing checks on Develop PR: $DEVELOP_CHECKS"

          if [ "$DEVELOP_TOTAL" -eq 0 ]; then
            echo "⚠️  Develop PR has 0 status checks (expected for forks)"
          elif [ "$DEVELOP_CHECKS" -ne "$DEVELOP_TOTAL" ]; then
            echo "❌ Develop PR: not all checks passed"
            echo "🔍 Failed/Missing checks details:"
            echo "$DEVELOP_ALL_CHECKS" | jq '.[] | select(.conclusion | IN("FAILURE", "TIMED_OUT", "ACTION_REQUIRED"))'
            gh pr checks --repo "${{ github.repository }}" "$DEVELOP_PR"
            exit 1
          else
            echo "✅ Develop PR: all checks passed"
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ env.GH_TOKEN }}

      - name: Final Safety Check
        run: |
          # Verify PR branch heads match expected release branch (prevent accidental mismatches)
          MAIN_PR=${{ github.event.pull_request.number }}
          DEVELOP_PR=${{ steps.pr-develop.outputs.pr_develop }}

          echo "🔒 Verifying PR branch heads before finishing..."

          # Check main PR head branch
          MAIN_PR_HEAD=$(gh pr view "$MAIN_PR" \
            --repo "${{ github.repository }}" \
            --json "headRefName" \
            --jq ".headRefName")

          if [ "$MAIN_PR_HEAD" != "${{ env.HEAD_REF }}" ]; then
            echo "❌ SAFETY CHECK FAILED: Main PR #$MAIN_PR head is $MAIN_PR_HEAD, expected ${{ env.HEAD_REF }}"
            exit 1
          fi

          # Check develop PR head branch
          DEVELOP_PR_HEAD=$(gh pr view "$DEVELOP_PR" \
            --repo "${{ github.repository }}" \
            --json "headRefName" \
            --jq ".headRefName")

          if [ "$DEVELOP_PR_HEAD" != "${{ env.HEAD_REF }}" ]; then
            echo "❌ SAFETY CHECK FAILED: Develop PR #$DEVELOP_PR head is $DEVELOP_PR_HEAD, expected ${{ env.HEAD_REF }}"
            exit 1
          fi

          echo "✅ Safety check passed: Both PRs have correct branch heads (${{ env.HEAD_REF }})"
          echo ""
          echo "📋 **Release Summary**"
          echo "   Version: ${{ steps.extract.outputs.release_number }}"
          echo "   Branch: ${{ env.HEAD_REF }}"
          echo "   Main PR: #$MAIN_PR"
          echo "   Develop PR: #$DEVELOP_PR"
          echo ""
          echo "🚀 Proceeding with release finish..."

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          sudo apt-get update && sudo apt-get install -y git-flow

      - name: Configure git-flow
        run: |
          git flow config set versiontagprefix "v"

      - name: Fetch Release Branch
        run: |
          # Fetch with specific error handling
          FETCH_OUTPUT=$(git fetch origin "release/${{ steps.extract.outputs.release_number }}" 2>&1)
          FETCH_STATUS=$?

          if [ $FETCH_STATUS -ne 0 ]; then
            if echo "$FETCH_OUTPUT" | grep -q "couldn't find remote ref"; then
              echo "❌ Remote branch not found: release/${{ steps.extract.outputs.release_number }}"
              exit 1
            else
              echo "❌ Git fetch failed: $FETCH_OUTPUT"
              exit 1
            fi
          fi

          git checkout -b "release/${{ steps.extract.outputs.release_number }}" "origin/release/${{ steps.extract.outputs.release_number }}"
          echo "✅ Checked out release branch"

      - name: Execute git-flow release finish
        run: |
          # Execute git-flow release finish with messaging
          git flow release finish -m "Merge release/${{ steps.extract.outputs.release_number }}" "${{ steps.extract.outputs.release_number }}"
          echo "✅ Git-flow release finish completed"

      - name: Push All Changes
        run: |
          # Push to main, develop, and all tags
          git push origin main develop --all --tags
          echo "✅ Pushed to main, develop, and tags"

      - name: Delete Remote Release Branch
        run: |
          git push origin --delete "release/${{ steps.extract.outputs.release_number }}" || true
          echo "✅ Remote release branch deleted"

      - name: Close Related PRs
        run: |
          # Close both PRs
          DEVELOP_PR=${{ steps.pr-develop.outputs.pr_develop }}
          MAIN_PR=${{ github.event.pull_request.number }}

          gh pr close "$MAIN_PR" --comment "✅ Automatically closed - release merged to main"
          gh pr close "$DEVELOP_PR" --comment "✅ Automatically closed - release merged to develop"
          echo "✅ Related PRs closed"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Release ${{ steps.extract.outputs.release_number }} - Auto-Finish Complete ✅"
            echo ""
            echo "**Release Branch:** ${{ env.HEAD_REF }}"
            echo "**Release Number:** ${{ steps.extract.outputs.release_number }}"
            echo "**Status:** Successfully merged to main and develop"
            echo ""
            echo "**What happened:**"
            echo "- Release branch merged to main"
            echo "- Release branch merged back to develop"
            echo "- Tag v${{ steps.extract.outputs.release_number }} created"
            echo "- Both PRs automatically closed"
          } >> $GITHUB_STEP_SUMMARY
