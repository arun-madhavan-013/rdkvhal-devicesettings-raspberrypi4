name: Auto Finish Approved Release

on:
  pull_request_review:
    types:
      - submitted
    branches:
      - develop
      - main
  pull_request:
    types:
      - synchronize
      - reopened
    branches:
      - develop
      - main
  check_suite:
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: release-${{ github.event_name == 'check_suite' && github.event.check_suite.pull_requests[0].head.ref || github.event.pull_request.head.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  finish:
    name: Auto Finish Approved Release
    if: |
      (
        (github.event_name == 'pull_request' || github.event_name == 'pull_request_review') &&
        github.event.pull_request.state == 'open' &&
        (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'develop') &&
        startsWith(github.event.pull_request.head.ref, 'release/') &&
        (github.event_name != 'pull_request_review' || github.event.review.state == 'approved')
      ) || (
        github.event_name == 'check_suite' &&
        github.event.check_suite.conclusion == 'success' &&
        github.event.check_suite.pull_requests[0] != null &&
        github.event.check_suite.pull_requests[0].state == 'open' &&
        (github.event.check_suite.pull_requests[0].base.ref == 'main' || github.event.check_suite.pull_requests[0].base.ref == 'develop') &&
        startsWith(github.event.check_suite.pull_requests[0].head.ref, 'release/')
      )
    runs-on: ubuntu-latest
    env:
      HEAD_REF: ${{ github.event_name == 'check_suite' && github.event.check_suite.pull_requests[0].head.ref || github.event.pull_request.head.ref }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Extract release number
        id: extract
        run: |
          set -euo pipefail
          RELNUM="${HEAD_REF#release/}"
          if ! [[ "${RELNUM}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release branch '${HEAD_REF}' (expected release/X.Y.Z)."
            exit 1
          fi
          echo "release_number=${RELNUM}" >> "${GITHUB_OUTPUT}"

      - name: Ensure exactly one related PR per base
        id: prcheck
        run: |
          set -euo pipefail
          DEVELOP_COUNT=$(gh pr list --base develop --head "${HEAD_REF}" --state open --json number --jq 'length')
          MAIN_COUNT=$(gh pr list --base main --head "${HEAD_REF}" --state open --json number --jq 'length')

          if [ "${DEVELOP_COUNT}" -ne 1 ]; then
            echo "::notice title=Waiting::Expected 1 open PR to develop for ${HEAD_REF}, found ${DEVELOP_COUNT}."
            echo "should_finish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${MAIN_COUNT}" -ne 1 ]; then
            echo "::notice title=Waiting::Expected 1 open PR to main for ${HEAD_REF}, found ${MAIN_COUNT}."
            echo "should_finish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          DEVELOP_PR=$(gh pr list --base develop --head "${HEAD_REF}" --state open --json number --jq '.[0].number')
          MAIN_PR=$(gh pr list --base main --head "${HEAD_REF}" --state open --json number --jq '.[0].number')

          echo "develop_pr=${DEVELOP_PR}" >> "${GITHUB_OUTPUT}"
          echo "main_pr=${MAIN_PR}" >> "${GITHUB_OUTPUT}"
          echo "should_finish=true" >> "${GITHUB_OUTPUT}"

      - name: Ensure both PRs are approved
        id: approvals
        if: steps.prcheck.outputs.should_finish == 'true'
        run: |
          set -euo pipefail
          MAIN_APPROVAL=$(gh pr view "${{ steps.prcheck.outputs.main_pr }}" --json reviewDecision --jq '.reviewDecision')
          DEV_APPROVAL=$(gh pr view "${{ steps.prcheck.outputs.develop_pr }}" --json reviewDecision --jq '.reviewDecision')

          if [ "${MAIN_APPROVAL}" != "APPROVED" ]; then
            echo "::notice title=Waiting::Main PR #${{ steps.prcheck.outputs.main_pr }} is not approved (${MAIN_APPROVAL})."
            echo "should_finish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${DEV_APPROVAL}" != "APPROVED" ]; then
            echo "::notice title=Waiting::Develop PR #${{ steps.prcheck.outputs.develop_pr }} is not approved (${DEV_APPROVAL})."
            echo "should_finish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "should_finish=true" >> "${GITHUB_OUTPUT}"

      - name: Ensure checks passed on both PRs
        id: checks
        if: steps.approvals.outputs.should_finish == 'true'
        run: |
          set -euo pipefail

          check_pr() {
            local pr_number="$1"
            local total
            local passing

            total=$(gh pr checks "${pr_number}" --json conclusion --jq 'length')
            if [ "${total}" -eq 0 ]; then
              echo "PR #${pr_number} has zero checks; skipping strict check gate."
              return 0
            fi

            passing=$(gh pr checks "${pr_number}" --json conclusion --jq '[.[] | select(.conclusion | IN("SUCCESS","NEUTRAL","SKIPPED","CANCELLED"))] | length')
            if [ "${passing}" -ne "${total}" ]; then
              echo "::notice title=Waiting::PR #${pr_number} has failing/pending checks."
              gh pr checks "${pr_number}"
              return 1
            fi

            return 0
          }

          if ! check_pr "${{ steps.prcheck.outputs.main_pr }}"; then
            echo "should_finish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ! check_pr "${{ steps.prcheck.outputs.develop_pr }}"; then
            echo "should_finish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "should_finish=true" >> "${GITHUB_OUTPUT}"

      - name: Checkout repository
        if: steps.checks.outputs.should_finish == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ env.GH_TOKEN }}

      - name: Setup git and git-flow
        if: steps.checks.outputs.should_finish == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          sudo apt-get update
          sudo apt-get install -y git-flow
          git config gitflow.branch.master main
          git config gitflow.branch.develop develop
          git config gitflow.prefix.feature feature/
          git config gitflow.prefix.bugfix bugfix/
          git config gitflow.prefix.release release/
          git config gitflow.prefix.hotfix hotfix/
          git config gitflow.prefix.support support/
          git config gitflow.prefix.versiontag ""

      - name: Final branch-head safety check
        if: steps.checks.outputs.should_finish == 'true'
        run: |
          set -euo pipefail
          MAIN_HEAD=$(gh pr view "${{ steps.prcheck.outputs.main_pr }}" --json headRefName --jq '.headRefName')
          DEV_HEAD=$(gh pr view "${{ steps.prcheck.outputs.develop_pr }}" --json headRefName --jq '.headRefName')

          if [ "${MAIN_HEAD}" != "${HEAD_REF}" ]; then
            echo "Main PR head mismatch: ${MAIN_HEAD} != ${HEAD_REF}"
            exit 1
          fi

          if [ "${DEV_HEAD}" != "${HEAD_REF}" ]; then
            echo "Develop PR head mismatch: ${DEV_HEAD} != ${HEAD_REF}"
            exit 1
          fi

      - name: Finish release
        id: finish_release
        if: steps.checks.outputs.should_finish == 'true'
        run: |
          set -euo pipefail
          RELNUM="${{ steps.extract.outputs.release_number }}"
          RELEASE_BRANCH="release/${RELNUM}"

          # Idempotency guard: if tag already exists and release branch is gone, release is already finished.
          TAG_EXISTS=false
          BRANCH_EXISTS=false
          if git ls-remote --exit-code --tags origin "refs/tags/${RELNUM}" >/dev/null 2>&1; then
            TAG_EXISTS=true
          fi
          if git ls-remote --exit-code --heads origin "${RELEASE_BRANCH}" >/dev/null 2>&1; then
            BRANCH_EXISTS=true
          fi

          if [ "${TAG_EXISTS}" = true ] && [ "${BRANCH_EXISTS}" = false ]; then
            echo "::notice title=Already Finished::Tag ${RELNUM} exists and ${RELEASE_BRANCH} is absent; nothing to do."
            echo "did_finish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          FETCH_OUTPUT=$(git fetch origin main develop "${RELEASE_BRANCH}" 2>&1) || true
          if echo "${FETCH_OUTPUT}" | grep -q "couldn't find remote ref"; then
            echo "::notice title=Already Finished::${RELEASE_BRANCH} no longer exists on origin."
            echo "did_finish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [ -n "${FETCH_OUTPUT}" ] && echo "${FETCH_OUTPUT}" | grep -qiE "fatal|error"; then
            echo "Git fetch failed: ${FETCH_OUTPUT}"
            exit 1
          fi

          # Ensure local branches exist and track remote before running git-flow finish.
          git checkout -B main origin/main
          git checkout -B develop origin/develop
          git checkout -B "${RELEASE_BRANCH}" "origin/${RELEASE_BRANCH}"

          set +e
          FINISH_OUTPUT=$(git flow release finish -m "Merge ${RELEASE_BRANCH}" "${RELNUM}" 2>&1)
          FINISH_STATUS=$?
          set -e

          if [ "${FINISH_STATUS}" -ne 0 ]; then
            # Only treat as benign when release is already finished remotely.
            TAG_EXISTS_AFTER=false
            BRANCH_EXISTS_AFTER=false
            if git ls-remote --exit-code --tags origin "refs/tags/${RELNUM}" >/dev/null 2>&1; then
              TAG_EXISTS_AFTER=true
            fi
            if git ls-remote --exit-code --heads origin "${RELEASE_BRANCH}" >/dev/null 2>&1; then
              BRANCH_EXISTS_AFTER=true
            fi

            if [ "${TAG_EXISTS_AFTER}" = true ] && [ "${BRANCH_EXISTS_AFTER}" = false ]; then
              echo "::notice title=Already Finished::git-flow finish reported an error, but remote already reflects completed release."
              echo "${FINISH_OUTPUT}"
              echo "did_finish=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "git-flow release finish failed:"
            echo "${FINISH_OUTPUT}"
            exit 1
          fi

          echo "${FINISH_OUTPUT}"

          git push origin main develop --tags
          git push origin --delete "${RELEASE_BRANCH}" || true
          echo "did_finish=true" >> "${GITHUB_OUTPUT}"

      - name: Close related PRs
        if: always() && steps.finish_release.outputs.did_finish == 'true'
        run: |
          set -euo pipefail
          gh pr close "${{ steps.prcheck.outputs.main_pr }}" --comment "Auto-finish completed for ${HEAD_REF}." || true
          gh pr close "${{ steps.prcheck.outputs.develop_pr }}" --comment "Auto-finish completed for ${HEAD_REF}." || true

      - name: Summary
        if: always()
        run: |
          {
            echo "## Release ${{ steps.extract.outputs.release_number }} auto-finish"
            echo ""
            echo "- Branch: ${HEAD_REF}"
            echo "- Main PR: #${{ steps.prcheck.outputs.main_pr }}"
            echo "- Develop PR: #${{ steps.prcheck.outputs.develop_pr }}"
          } >> "${GITHUB_STEP_SUMMARY}"
